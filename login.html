<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NotesByRaheem.xyz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        /* Temporary styles for login page until main.css is created */
        :root {
            --primary-color: #4361ee;
            --primary-dark: #3a56d4;
            --secondary-color: #7209b7;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --gray-light: #e9ecef;
            --gray-medium: #adb5bd;
            --gray-dark: #495057;
            --success-color: #4cc9f0;
            --danger-color: #f94144;
            --border-radius: 12px;
            --box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7ff 0%, #e3e9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: var(--box-shadow);
            text-align: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 2.5rem;
            color: var(--primary-color);
        }
        
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark-color);
        }
        
        .logo .domain {
            color: var(--secondary-color);
        }
        
        .login-card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--dark-color);
        }
        
        .login-card p {
            color: var(--gray-dark);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-medium);
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-login:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(67, 97, 238, 0.2);
        }
        
        .login-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        
        .login-message.success {
            background-color: rgba(76, 201, 240, 0.1);
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .login-message.error {
            background-color: rgba(249, 65, 68, 0.1);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .role-info {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
        }
        
        .role-info h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .role-info ul {
            list-style: none;
            padding-left: 5px;
        }
        
        .role-info li {
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .role-info li i {
            color: var(--primary-color);
            font-size: 0.8rem;
            margin-top: 3px;
        }
        
        .back-home {
            margin-top: 25px;
            text-align: center;
        }
        
        .back-home a {
            color: var(--gray-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .back-home a:hover {
            color: var(--primary-color);
        }
        
        @media (max-width: 576px) {
            .login-card {
                padding: 30px 25px;
            }
            
            .logo h1 {
                font-size: 1.5rem;
            }
            
            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>NotesByRaheem<span class="domain">.xyz</span></h1>
            </div>
            
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your account</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password" id="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                
                <div class="login-message" id="login-message"></div>
            </form>
            
            <div class="role-info">
                <h3><i class="fas fa-info-circle"></i> Login Information</h3>
                <ul>
                    <li><i class="fas fa-check-circle"></i> <strong>Owner:</strong> raheem / owner123</li>
                    <li><i class="fas fa-check-circle"></i> <strong>Admin:</strong> admin1 / admin123</li>
                    <li><i class="fas fa-check-circle"></i> <strong>Student:</strong> student01 / student123</li>
                    <li><i class="fas fa-exclamation-circle"></i> All accounts are created and managed by the owner</li>
                </ul>
            </div>
            
            <div class="back-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
            </div>
        </div>
    </div>

    <script>
        // Authentication simulation
        const users = [
            {
                id: 1,
                username: 'raheem',
                password: 'owner123',
                role: 'owner',
                fullName: 'Raheem Ahmed',
                email: 'raheem@notesbyraheem.xyz',
                isActive: true
            },
            {
                id: 2,
                username: 'admin1',
                password: 'admin123',
                role: 'admin',
                fullName: 'Admin One',
                email: 'admin1@notesbyraheem.xyz',
                isActive: true
            },
            {
                id: 3,
                username: 'student01',
                password: 'student123',
                role: 'student',
                fullName: 'Ali Khan',
                email: 'ali.khan@example.com',
                rollNumber: 'CS-2023-001',
                isActive: true
            },
            {
                id: 4,
                username: 'student02',
                password: 'student123',
                role: 'student',
                fullName: 'Sara Ahmed',
                email: 'sara.ahmed@example.com',
                rollNumber: 'CS-2023-002',
                isActive: true
            }
        ];

        // DOM elements
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const loginMessage = document.getElementById('login-message');
        const forgotPasswordLink = document.getElementById('forgot-password');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Forgot password handler
        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            showMessage('Password reset requests must be made directly to the owner (Raheem).', 'error');
        });

        // Login form submission
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const rememberMe = document.getElementById('remember-me').checked;
            
            // Clear previous messages
            loginMessage.style.display = 'none';
            loginMessage.className = 'login-message';
            
            // Validate inputs
            if (!username || !password) {
                showMessage('Please enter both username and password.', 'error');
                return;
            }
            
            // Find user
            const user = users.find(u => u.username === username && u.password === password);
            
            if (!user) {
                showMessage('Invalid username or password. Please try again.', 'error');
                return;
            }
            
            if (!user.isActive) {
                showMessage('Your account has been deactivated. Contact the owner.', 'error');
                return;
            }
            
            // Successful login
            showMessage(`Login successful! Redirecting to ${user.role} dashboard...`, 'success');
            
            // Store user session
            const sessionData = {
                id: user.id,
                username: user.username,
                name: user.fullName,
                role: user.role,
                email: user.email,
                loginTime: new Date().toISOString()
            };
            
            if (rememberMe) {
                localStorage.setItem('currentUser', JSON.stringify(sessionData));
                localStorage.setItem('rememberMe', 'true');
            } else {
                sessionStorage.setItem('currentUser', JSON.stringify(sessionData));
            }
            
            // Redirect based on role after a short delay
            setTimeout(() => {
                switch(user.role) {
                    case 'owner':
                        window.location.href = 'owner/dashboard.html';
                        break;
                    case 'admin':
                        window.location.href = 'admin/dashboard.html';
                        break;
                    case 'student':
                        window.location.href = 'student/dashboard.html';
                        break;
                    default:
                        window.location.href = 'index.html';
                }
            }, 1500);
        });

        // Show message function
        function showMessage(text, type) {
            loginMessage.textContent = text;
            loginMessage.className = `login-message ${type}`;
            loginMessage.style.display = 'block';
            
            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    loginMessage.style.display = 'none';
                }, 5000);
            }
        }

        // Check for existing session on page load
        document.addEventListener('DOMContentLoaded', function() {
            const session = localStorage.getItem('currentUser') ||
                           sessionStorage.getItem('currentUser');
            
            if (session) {
                try {
                    const userData = JSON.parse(session);
                    usernameInput.value = userData.username;
                    
                    // If "remember me" was checked, show a welcome back message
                    if (localStorage.getItem('rememberMe')) {
                        showMessage(`Welcome back, ${userData.username}!`, 'success');
                        setTimeout(() => {
                            loginMessage.style.display = 'none';
                        }, 3000);
                    }
                } catch (e) {
                    // Invalid session data, clear it
                    localStorage.removeItem('currentUser');
                    sessionStorage.removeItem('currentUser');
                    localStorage.removeItem('rememberMe');
                }
            }
        });
    </script>
</body>
</html>
